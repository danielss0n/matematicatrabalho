<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
</head>
<body>

    <form name="formcalcx">

        Cordenada XA: <input type="text" name="txtnumxa"> <br>
        Cordenada XB: <input type="text" name="txtnumxb"> <br> <br>

    </form>

        <input type="button" value="Calcular" onclick="sumValues()"> <br> <br>
    
    <form name="formcalcy">

        Cordenada YA: <input type="text" name="txtnumya"> <br>
        Cordenada YA: <input type="text" name="txtnumyb"> <br> <br> <br>

        <!--botoes de resultado-->
        Ponto médio X: <input type="text" name="txtresx"> <br>
        Ponto médio Y: <input type="text" name="txtresy"> <br>

    </form>



    <script type="text/javascript">

        function sumValues(){
        
        //transforamar os forms em variaveis
            var xa, xb, ya, yb
         xa=Number(document.formcalcx.txtnumxa.value)
         xb=Number(document.formcalcx.txtnumxb.value)
         ya=Number(document.formcalcy.txtnumya.value)
         yb=Number(document.formcalcy.txtnumyb.value)
        
        //calculo
         respostax = (xa + xb) / 2
         respostay = (ya + yb) / 2
        
        //resultados do calculo
         document.formcalcy.txtresx.value=respostax
         document.formcalcy.txtresy.value=respostay
        }

    </script>
</body>
</html>
